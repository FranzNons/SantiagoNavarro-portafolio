<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santiago Navarro -- Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Manrope:wght@700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1714;--ink-mid:#3d3530;--ink-light:#6b5f55;--ink-ghost:#a89e94;
  --paper:#fafaf7;--dot:#ccc8bf;--accent:#f0c230;--pin-red:#c0392b;
  --ui-bg:rgba(250,250,247,0.93);--ui-border:rgba(0,0,0,0.08);
}
html,body{width:100%;height:100%;overflow:hidden;background:#e8e3da;
  font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;
  user-select:none;cursor:default}
#board{position:fixed;inset:0;background-color:var(--paper);
  background-image:radial-gradient(circle,var(--dot) 1.2px,transparent 1.2px);
  background-size:26px 26px;overflow:hidden}
#canvas{position:absolute;width:4000px;height:3000px;top:0;left:0}
.drag{position:absolute;cursor:grab}
.drag:active{cursor:grabbing}
.drag.dragging{z-index:800!important;cursor:grabbing}

/* ── SKIN: blueprint ── */
body.skin-blueprint {
  --ink:#e8f4ff;--ink-mid:#b8d4f0;--ink-light:#7aabdc;--ink-ghost:#3a6a9a;
  --paper:#0a1628;--dot:rgba(255,255,255,0.18);--accent:#4a9eff;
  --pin-red:#ff6b6b;--ui-bg:rgba(6,14,30,0.92);--ui-border:rgba(255,255,255,0.10);
  font-family:'Space Mono',monospace!important;
}
body.skin-blueprint #board {
  background-color:#0a1628;
  background-image:
    linear-gradient(rgba(255,255,255,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.07) 1px,transparent 1px),
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:52px 52px,52px 52px,13px 13px,13px 13px;
  background-position:-1px -1px,-1px -1px,-1px -1px,-1px -1px;
}
/* Blueprint overrides -- capsule cards instead of torn paper */
body.skin-blueprint .torn {
  background:transparent!important;
  filter:none!important;
}
body.skin-blueprint .torn::before,
body.skin-blueprint .torn::after { display:none!important; }
body.skin-blueprint .torn-inner {
  background:#061424;
  border:1px solid rgba(74,158,255,0.30);
  border-radius:12px;
  box-shadow:0 4px 24px rgba(0,0,0,0.5),inset 0 1px 0 rgba(74,158,255,0.10);
  font-family:'Space Mono',monospace;
}
body.skin-blueprint .note-eyebrow {
  font-family:'Space Mono',monospace;color:rgba(74,158,255,0.7);
  letter-spacing:1.5px;
}
body.skin-blueprint .note-headline {
  font-family:'Space Mono',monospace;color:#e8f4ff;font-size:16px;line-height:1.3;
}
body.skin-blueprint .note-handwritten {
  font-family:'Space Mono',monospace;font-style:italic;color:#7aabdc;font-size:14px;
}
body.skin-blueprint .note-body {
  font-family:'Space Mono',monospace;color:#b8d4f0;font-size:11px;line-height:1.7;
}
body.skin-blueprint .note-link { color:#4a9eff; }
body.skin-blueprint .note-pin {
  background:radial-gradient(circle at 38% 32%,#7aabdc,#2a5a8c);
}
body.skin-blueprint .polaroid {
  background:#061424;border:1px solid rgba(74,158,255,0.30);
  border-radius:12px;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
  padding:10px 10px 36px;
}
body.skin-blueprint .polaroid-img { background:#0d2040;border-radius:6px; }
body.skin-blueprint .polaroid-caption {
  font-family:'Space Mono',monospace;color:#7aabdc;font-size:11px;
}
body.skin-blueprint .insta-post {
  background:#061424;border:1px solid rgba(74,158,255,0.25);border-radius:10px;
}
body.skin-blueprint .insta-img { background:#0d2040;border-radius:8px 8px 0 0; }
body.skin-blueprint .insta-actions { color:#7aabdc; }
body.skin-blueprint .insta-caption {
  font-family:'Space Mono',monospace;color:#3a6a9a;font-size:10px;
}
body.skin-blueprint .browser {
  background:#061424;border:1px solid rgba(74,158,255,0.25);border-radius:12px;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
}
body.skin-blueprint .browser-bar { background:#0d2040; }
body.skin-blueprint .browser-url { background:#0a1628;color:#4a9eff; }
body.skin-blueprint .browser-screen { background:#0d2040; }
body.skin-blueprint .logo-star {
  background:linear-gradient(135deg,#1a4a8a,#0d2a5c);
  box-shadow:0 0 20px rgba(74,158,255,0.3);
}
body.skin-blueprint .logo-star-text { color:#4a9eff; }
body.skin-blueprint .logo-label { color:#3a6a9a; }
body.skin-blueprint .agencia-star { background:#0d2040;border:1px solid rgba(74,158,255,0.2); }
body.skin-blueprint .float-icon { color:#4a9eff;opacity:0.7; }
body.skin-blueprint .ph { background:#0d2040; }
body.skin-blueprint .ph-text { color:#3a6a9a; }
body.skin-blueprint .banner-ph { background:#0d2040;color:#3a6a9a; }
body.skin-blueprint .embed-wrap { background:#061424;border:1px solid rgba(74,158,255,0.25);border-radius:10px; }
body.skin-blueprint .embed-label { background:#0d2040;color:#4a9eff; }
/* Nav and UI in blueprint */
body.skin-blueprint #nav,
body.skin-blueprint #hint-pill,
body.skin-blueprint #reset-btn {
  background:rgba(6,14,30,0.92);border-color:rgba(74,158,255,0.20);
}
body.skin-blueprint .nav-btn {
  background:#0d2040;border-color:rgba(74,158,255,0.25);color:#7aabdc;
}
body.skin-blueprint .nav-btn:hover:not(:disabled) { background:#1a3a6a; }
body.skin-blueprint #nav-label { color:#b8d4f0; }
body.skin-blueprint .nav-dot { background:#1a3a6a; }
body.skin-blueprint .nav-dot.active { background:#4a9eff; }
body.skin-blueprint #hint-pill,
body.skin-blueprint #reset-btn { color:#3a6a9a; }
/* Magnifier in blueprint */
body.skin-blueprint #mag-ring {
  box-shadow:0 0 0 9px #1a3a6a,0 0 0 11px #0d2040,0 0 0 13px #4a9eff44,0 6px 24px rgba(0,0,0,0.5);
}
body.skin-blueprint #mag-collar { background:linear-gradient(180deg,#4a9eff 0%,#1a4a8a 50%,#4a9eff 100%); }
body.skin-blueprint #mag-handle {
  background:linear-gradient(to right,#061424 0%,#0d2040 40%,#1a3a6a 50%,#0d2040 60%,#061424 100%);
}
/* Edit mode in blueprint */
body.skin-blueprint.edit-mode .drag { outline-color:rgba(74,158,255,0.4); }
body.skin-blueprint.edit-mode .drag:hover { outline-color:#4a9eff; }
body.skin-blueprint.edit-mode .drag.selected { outline-color:#4a9eff; }
body.edit-mode .drag{outline:1.5px dashed rgba(240,194,48,0.4);outline-offset:4px}
body.edit-mode .drag:hover{outline-color:#f0c230}
body.edit-mode .drag.selected{outline:2px solid #f0c230;outline-offset:4px;z-index:600}
body.edit-mode [data-editable][contenteditable="true"]{
  cursor:text;
  border-radius:3px;
  transition:background 0.15s;
}
body.edit-mode [data-editable][contenteditable="true"]:hover{
  background:rgba(240,194,48,0.06);
}
body.edit-mode [data-editable][contenteditable="true"]:focus{
  background:rgba(240,194,48,0.08);
  outline:none;
}
.delete-btn{position:absolute;top:-14px;right:-14px;width:26px;height:26px;
  border-radius:50%;background:#c0392b;border:2px solid #fff;
  color:#fff;font-size:14px;line-height:1;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  z-index:1000;box-shadow:0 2px 6px rgba(0,0,0,0.3);
  font-family:'DM Sans',sans-serif;font-weight:700;
  transition:background 0.15s,transform 0.1s}
.delete-btn:hover{background:#e74c3c;transform:scale(1.1)}
body.edit-mode .drag.selected .delete-btn{display:flex}
.note-pin{position:absolute;width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#ff7070,var(--pin-red));
  box-shadow:0 2px 5px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.28);z-index:20}
.torn{background:#fff;position:relative;filter:drop-shadow(1px 3px 6px rgba(0,0,0,0.10))}
.drag.dragging .torn{filter:drop-shadow(4px 7px 14px rgba(0,0,0,0.18))}
.torn::before{content:'';position:absolute;top:-6px;left:0;right:0;height:12px;
  background:#fff;clip-path:polygon(0% 100%,2% 20%,5% 80%,8% 10%,11% 70%,14% 0%,
  17% 60%,20% 15%,23% 75%,26% 5%,29% 65%,32% 20%,35% 80%,38% 10%,41% 70%,
  44% 0%,47% 60%,50% 15%,53% 80%,56% 5%,59% 65%,62% 20%,65% 80%,68% 10%,
  71% 70%,74% 0%,77% 60%,80% 15%,83% 75%,86% 5%,89% 65%,92% 20%,95% 80%,
  98% 10%,100% 50%,100% 100%)}
.torn::after{content:'';position:absolute;bottom:-6px;left:0;right:0;height:12px;
  background:#fff;clip-path:polygon(0% 0%,100% 0%,98% 80%,95% 20%,92% 90%,89% 30%,
  86% 100%,83% 40%,80% 85%,77% 15%,74% 90%,71% 25%,68% 80%,65% 10%,62% 70%,
  59% 0%,56% 60%,53% 20%,50% 85%,47% 15%,44% 75%,41% 5%,38% 65%,35% 25%,
  32% 80%,29% 10%,26% 70%,23% 0%,20% 55%,17% 20%,14% 85%,11% 30%,8% 90%,
  5% 20%,2% 70%,0% 0%)}
.torn-inner{padding:20px 24px 22px;position:relative}
.note-eyebrow{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-ghost);margin-bottom:7px}
.note-headline{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink);
  line-height:1.2;margin-bottom:4px}
.note-handwritten{font-family:'Caveat',cursive;font-size:17px;color:var(--ink-light);line-height:1.4}
.note-body{font-size:12.5px;line-height:1.65;color:var(--ink-mid)}
.note-link{display:inline-block;margin-top:8px;font-size:11.5px;color:var(--ink-light);
  text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.note-link:hover{color:var(--ink)}
.logo-el{display:flex;flex-direction:column;align-items:center;gap:6px}
.logo-star{width:74px;height:74px;background:var(--accent);
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  display:flex;align-items:center;justify-content:center;position:relative}
.logo-star img{width:46px;height:46px;object-fit:contain}
.logo-star-text{font-family:'DM Serif Display',serif;font-size:13px;color:#7a5c00;position:absolute}
.logo-label{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--ink-ghost)}
.agencia-el{display:flex;flex-direction:column;align-items:center;gap:5px}
.agencia-star{width:52px;height:52px;background:#e8e3da;
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  display:flex;align-items:center;justify-content:center;position:relative}
.agencia-star img{width:32px;height:32px;object-fit:contain}
.agencia-star-text{font-family:'DM Serif Display',serif;font-size:10px;color:#7a7068;position:absolute}
.agencia-eyebrow,.agencia-label{font-family:'DM Sans',sans-serif;font-size:9px;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-ghost);text-align:center}
.polaroid{background:#fff;padding:9px 9px 34px;box-shadow:2px 4px 14px rgba(0,0,0,0.14)}
.polaroid-img{width:190px;height:172px;overflow:hidden;background:#ddd8ce;
  display:flex;align-items:center;justify-content:center}
.polaroid-img img{width:100%;height:100%;object-fit:cover}
.polaroid-caption{margin-top:8px;font-family:'Caveat',cursive;font-size:14px;
  color:var(--ink-light);text-align:center}
.insta-post{width:126px;background:#fff;border-radius:2px;
  border:0.5px solid #ddd8cf;box-shadow:1px 2px 5px rgba(0,0,0,0.07);overflow:hidden}
.insta-img{width:126px;height:126px;background:#111;overflow:hidden;
  display:flex;align-items:center;justify-content:center;position:relative}
.insta-img img{width:100%;height:100%;object-fit:cover}
.insta-actions{display:flex;align-items:center;gap:6px;padding:5px 7px 2px;
  font-size:12px;color:var(--ink-mid)}
.insta-save{margin-left:auto}
.insta-caption{padding:1px 7px 7px;font-family:'Caveat',cursive;font-size:11px;color:var(--ink-ghost)}
.browser{background:#2a2a2a;border-radius:7px;overflow:hidden;
  box-shadow:2px 4px 16px rgba(0,0,0,0.22);width:380px}
.browser-bar{background:#383838;padding:7px 11px;display:flex;align-items:center;gap:5px}
.b-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.browser-url{flex:1;margin-left:8px;background:#4e4e4e;border-radius:3px;
  padding:3px 9px;font-size:10px;color:#aaa;font-family:'DM Sans',sans-serif;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.browser-screen{height:180px;background:#e8e2d8;display:flex;align-items:center;
  justify-content:center;overflow:hidden;position:relative}
.browser-screen img{width:100%;height:100%;object-fit:cover}
.float-icon{font-size:32px;line-height:1;color:var(--ink);opacity:0.85;
  filter:drop-shadow(1px 2px 3px rgba(0,0,0,0.12))}
.float-icon img{width:36px;height:36px;object-fit:contain}
.free-img{background:transparent}
.free-img img{max-width:200px;max-height:200px;object-fit:contain;display:block}
.banner-el{overflow:hidden;box-shadow:1px 2px 8px rgba(0,0,0,0.12)}
.banner-el img{width:100%;height:100%;object-fit:cover;display:block}
.banner-ph{width:320px;height:120px;background:#e0dbd2;display:flex;
  align-items:center;justify-content:center;font-family:'Caveat',cursive;
  font-size:13px;color:var(--ink-ghost)}
.embed-wrap{background:#fff;border-radius:4px;overflow:hidden;
  box-shadow:1px 2px 8px rgba(0,0,0,0.10);position:relative;display:inline-block}
.embed-resize{position:absolute;bottom:0;right:0;width:20px;height:20px;
  cursor:nwse-resize;z-index:20;
  background:linear-gradient(135deg,transparent 40%,rgba(0,0,0,0.2) 40%,rgba(0,0,0,0.2) 55%,transparent 55%,transparent 65%,rgba(0,0,0,0.2) 65%,rgba(0,0,0,0.2) 80%,transparent 80%)}
body.skin-blueprint .embed-resize{
  background:linear-gradient(135deg,transparent 40%,rgba(74,158,255,0.5) 40%,rgba(74,158,255,0.5) 55%,transparent 55%,transparent 65%,rgba(74,158,255,0.5) 65%,rgba(74,158,255,0.5) 80%,transparent 80%)}
.embed-wrap iframe{display:block;border:none}
.video-wrap{background:#000;border-radius:10px;overflow:hidden;
  box-shadow:2px 4px 16px rgba(0,0,0,0.3);position:relative}
.video-wrap video{display:block;width:100%;height:100%;object-fit:cover}
.video-wrap iframe{display:block;width:100%;height:100%;border:none}
.video-overlay{position:absolute;inset:0;z-index:10;cursor:grab;background:transparent}
.video-resize{position:absolute;bottom:0;right:0;width:20px;height:20px;
  cursor:nwse-resize;z-index:20;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.4) 40%,rgba(255,255,255,0.4) 55%,transparent 55%,transparent 65%,rgba(255,255,255,0.4) 65%,rgba(255,255,255,0.4) 80%,transparent 80%);
  border-radius:0 0 8px 0}
body.skin-blueprint .video-resize{
  background:linear-gradient(135deg,transparent 40%,rgba(74,158,255,0.5) 40%,rgba(74,158,255,0.5) 55%,transparent 55%,transparent 65%,rgba(74,158,255,0.5) 65%,rgba(74,158,255,0.5) 80%,transparent 80%)}
.video-overlay.dragging{cursor:grabbing}
.video-overlay.inactive{display:none}
.video-label{position:absolute;top:8px;left:8px;
  font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;color:rgba(255,255,255,0.6);
  background:rgba(0,0,0,0.45);padding:3px 7px;border-radius:10px;pointer-events:none}
body.skin-blueprint .video-wrap{box-shadow:0 4px 24px rgba(0,0,0,0.5),0 0 0 1px rgba(74,158,255,0.2)}
/* TABLET FRAME */
.tablet-wrap{
  position:relative;display:inline-block;
  background:linear-gradient(145deg,#2a2a2a,#1a1a1a);
  border-radius:28px;
  padding:20px 14px 28px;
  box-shadow:
    0 0 0 1.5px #444,
    0 8px 32px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.08);
}
.tablet-screen{
  background:#000;border-radius:10px;overflow:hidden;
  position:relative;
}
.tablet-screen iframe{display:block;border:none;}
.tablet-screen img{width:100%;height:100%;object-fit:cover;display:block;}
.tablet-cam{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:8px;height:8px;border-radius:50%;
  background:#111;border:1px solid #333;
}
.tablet-btn{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid #444;background:#222;
}
body.skin-blueprint .tablet-wrap{
  background:linear-gradient(145deg,#0d2040,#061424);
  box-shadow:0 0 0 1.5px rgba(74,158,255,0.3),0 8px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(74,158,255,0.1);
}
body.skin-blueprint .tablet-btn{ border-color:rgba(74,158,255,0.3);background:#0a1628; }

.embed-label{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--ink-ghost);padding:5px 8px 4px;
  background:#f5f0e8;border-bottom:0.5px solid #e0dbd2}
.ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:7px;background:#ece7de}
.ph-box{width:28px;height:28px;border:1.5px dashed #b5ada2;border-radius:3px;
  display:flex;align-items:center;justify-content:center}
.ph-text{font-family:'Caveat',cursive;font-size:11px;color:var(--ink-ghost);
  text-align:center;max-width:130px;line-height:1.4}
/* LIGHTBOX */
#lightbox{
  display:none;position:fixed;inset:0;z-index:99999;
  background:rgba(10,14,20,0.0);backdrop-filter:blur(0px);
  align-items:center;justify-content:center;
  overflow:hidden;
  transition:background 0.25s ease, backdrop-filter 0.25s ease;
}
#lightbox.open{
  display:flex;
  background:rgba(10,14,20,0.82);
  backdrop-filter:blur(6px);
}
#lightbox-inner{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:visible;
}
#lightbox-content{
  transform-origin:center center;
  transition:transform 0.28s cubic-bezier(0.4,0,0.2,1),opacity 0.22s;
  opacity:0;transform:scale(0.92);
  overflow:visible;
}
#lightbox.open #lightbox-content{opacity:1;transform:scale(1);}
#lightbox-close{
  position:fixed;top:20px;right:24px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.18);
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;font-family:'DM Sans',sans-serif;
  z-index:100000;
}
#lightbox-close:hover{background:rgba(255,255,255,0.22);}
#lightbox-hint{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(255,255,255,0.35);
  pointer-events:none;letter-spacing:1px;
}
/* Double-click hint on elements */
body:not(.edit-mode) .drag:hover::after{
  content:'doble clic para ampliar';
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:1px;
  color:var(--ink-ghost);white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity 0.2s;
}
body:not(.edit-mode) .drag:hover::after{opacity:1;}

/* ── SKIN: PlayStation Dark ── */
body.skin-dark{
  --ink:#ffffff;--ink-mid:#cccccc;--ink-light:#6b6b6b;--ink-ghost:#3a3a3a;
  --paper:#000000;--dot:rgba(255,255,255,0.06);
  --accent:#0070cc;--ui-bg:rgba(0,0,0,0.96);--ui-border:rgba(255,255,255,0.1);
  --card-radius:12px;font-family:'DM Sans',sans-serif;
}

function draggable(el, url) {
  var THRESHOLD = 5;
  var on = false, moved = false, sx, sy, ox, oy;
  var down = function(cx, cy, target) {
    if (target && target.contentEditable === 'true') return;
    on = true; moved = false; sx = cx; sy = cy;
    ox = parseInt(el.style.left) || 0; oy = parseInt(el.style.top) || 0;
    el.style.zIndex = 700;
  };
  var move = function(cx, cy) {
    if (!on) return;
    var dx = cx - sx, dy = cy - sy;
    if (!moved && Math.sqrt(dx*dx+dy*dy) > THRESHOLD) { moved = true; el.classList.add('dragging'); }
    if (moved) { el.style.left = (ox+dx)+'px'; el.style.top = (oy+dy)+'px'; }
  };
  var up = function() {
    if (!on) return;
    var wasClick = !moved;
    on = false; el.classList.remove('dragging'); el.style.zIndex = '';
    if (wasClick && EDIT.active) {
      if (selectedEl && selectedEl !== el) selectedEl.classList.remove('selected');
      selectedEl = el;
      el.classList.add('selected');
    } else if (wasClick && url) {
      window.open(url, '_blank');
    }
  };
  el.addEventListener('mousedown', function(e) {
    if (e.button!==0) return;
    // If target is actively editable, let browser handle it (cursor placement)
    if (e.target.contentEditable==='true') return;
    e.preventDefault(); e.stopPropagation();
    down(e.clientX,e.clientY,e.target);
  });
  document.addEventListener('mousemove', function(e) { move(e.clientX,e.clientY); });
  document.addEventListener('mouseup', up);
  el.addEventListener('touchstart', function(e) { var t=e.touches[0];down(t.clientX,t.clientY,e.target); }, {passive:true});
  document.addEventListener('touchmove', function(e) { var t=e.touches[0];move(t.clientX,t.clientY); }, {passive:true});
  document.addEventListener('touchend', up);
}

function place(el, key, customPos, url) {
  var pos = customPos || BASE[key] || { x:400, y:300 };
  el.classList.add('drag');
  el.style.left = pos.x+'px'; el.style.top = pos.y+'px';
  el.dataset.ox = pos.x; el.dataset.oy = pos.y;
  if (pos.rot) { el.style.transform = 'rotate('+pos.rot+'deg)'; el.dataset.rot = pos.rot; }
  if (key) el.dataset.key = key;
  if (url) el.style.cursor = 'pointer';
  // Delete button (shown in edit mode when selected)
  var delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.innerHTML = '&times;';
  delBtn.title = 'Eliminar elemento';
  delBtn.addEventListener('mousedown', function(e) { e.stopPropagation(); });
  delBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    el.parentNode && el.parentNode.removeChild(el);
    selectedEl = null;
    MAG.sync();
  });
  el.style.position = 'absolute';
  el.appendChild(delBtn);
  canvas.appendChild(el);
  draggable(el, url);
  return el;
}

function makePh(label) {

  return d;
}

function mkImg(src, alt) {
  var i = document.createElement('img');
  i.alt = alt || '';
  // If path has no extension, try .png then .svg then .jpg
  if (src && src.indexOf('.') === -1) {
    i.src = src + '.png';
    i.onerror = function() {
      i.onerror = function() {
        i.onerror = null;
        i.src = src + '.jpg';
      };
      i.src = src + '.svg';
    };
  } else {
    i.src = src;
  }
  return i;
}

function applyScales() {
  if (!SAVED_SCALES) return;
  var sm = {notes:'.torn',photo:'.polaroid',posts:'.insta-post',browser:'.browser',logo:'.logo-el,.agencia-el',icons:'.float-icon'};

    document.querySelectorAll('#canvas '+sel).forEach(function(el) {
      var rot = el.dataset.rot ? 'rotate('+el.dataset.rot+'deg) ' : '';
      el.style.transform = rot+'scale('+v+')'; el.style.transformOrigin='top left';
    });
  });
}

function updateNav() {

}

function go(i) { current=i; build(PROJECTS[current]); updateNav(); MAG.sync(); }

    window.addEventListener('touchmove',function(e){if(!self.on)return;var t=e.touches[0];var dx=t.clientX-self.sx,dy=t.clientY-self.sy;if(Math.sqrt(dx*dx+dy*dy)>3)self.moved=true;if(self.moved){self.wrap.style.left=(self.ox+dx)+'px';self.wrap.style.top=(self.oy+dy)+'px';self.sync();}},{passive:true});

    document.getElementById('btn-prev').addEventListener('click',function(){setTimeout(function(){self.sync();},120);});
    document.getElementById('btn-next').addEventListener('click',function(){setTimeout(function(){self.sync();},120);});
    this.board.addEventListener('mouseup',function(){setTimeout(function(){self.sync();},40);});
  },
  sync:function(){
    this.view.innerHTML=canvas.innerHTML;
    var n=this.view.querySelector('#mag-view'); if(n)n.remove();
    this.offset();
  },
  offset:function(){
    var wl=parseInt(this.wrap.style.left)||0, wt=parseInt(this.wrap.style.top)||0;
    var cx=wl+this.LENS_R, cy=wt+this.LENS_R;
    var br=this.board.getBoundingClientRect();
    var bx=cx-br.left, by=cy-br.top;
    var ox=this.LENS_R-bx*this.ZOOM, oy=this.LENS_R-by*this.ZOOM;
    this.view.style.transformOrigin='0 0';
    this.view.style.transform='translate('+ox+'px,'+oy+'px) scale('+this.ZOOM+')';
  }
};

var selectedEl = null;

function addEmbedResize(el, rz) {
  // Free resize — no fixed ratio for social embeds
  var startX, startY, startW, startH;
  rz.addEventListener('mousedown', function(e) {
    e.stopPropagation(); e.preventDefault();
    startX = e.clientX; startY = e.clientY;
    startW = el.offsetWidth; startH = el.offsetHeight;
    function onMove(ev) {
      var newW = Math.max(240, startW + (ev.clientX - startX));
      var newH = Math.max(200, startH + (ev.clientY - startY));
      el.style.width  = newW + 'px';
      // Also update iframe dimensions so embed reflows
      var fr = el.querySelector('iframe');
      if (fr) { fr.style.width = newW + 'px'; fr.width = newW; }
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function addVideoResize(el, rz) {
  var startX, startY, startW, startH;
  rz.addEventListener('mousedown', function(e) {
    e.stopPropagation(); e.preventDefault();
    startX = e.clientX; startY = e.clientY;
    startW = parseInt(el.style.width)  || el.offsetWidth;
    startH = parseInt(el.style.height) || el.offsetHeight;
    var ratio = parseFloat(el.dataset.ratio) || 0.5625;
    function onMove(ev) {
      var dx = ev.clientX - startX;
      var newW = Math.max(120, startW + dx);
      var newH = Math.round(newW * ratio);
      el.style.width  = newW + 'px';
      el.style.height = newH + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function addVideoOverlay(el, ov) {
  // Click without drag -> hide overlay so user can interact with video
  // Drag -> move element normally
  var startX, startY, dragged;
  ov.addEventListener('mousedown', function(e) {
    startX = e.clientX; startY = e.clientY; dragged = false;
  });
  ov.addEventListener('mousemove', function(e) {
    if (Math.abs(e.clientX-startX)>4 || Math.abs(e.clientY-startY)>4) dragged = true;
  });
  ov.addEventListener('mouseup', function(e) {
    if (!dragged) {
      // It was a click — hide overlay so video controls work
      ov.classList.add('inactive');
      // Re-show overlay when user clicks outside the video
      function reshow(ev) {
        if (!el.contains(ev.target)) {
          ov.classList.remove('inactive');
          document.removeEventListener('mousedown', reshow);
        }
      }
      document.addEventListener('mousedown', reshow);
    }
  });
}

// LIGHTBOX
var LB = {
  box:     document.getElementById('lightbox'),
  content: document.getElementById('lightbox-content'),

  open: function(el) {
    var clone = el.cloneNode(true);

    // Clean up interaction elements
    var del = clone.querySelector('.delete-btn'); if (del) del.remove();
    var ov  = clone.querySelector('.video-overlay'); if (ov) ov.remove();
    var rz  = clone.querySelector('.video-resize'); if (rz) rz.remove();
    var rze = clone.querySelector('.embed-resize'); if (rze) rze.remove();

    clone.classList.remove('drag','selected','dragging');
    clone.removeAttribute('style');
    clone.style.position = 'static';
    clone.style.display  = 'block';

    // Remove overflow/scrollbars from clone and ALL its descendants
    clone.style.overflow = 'visible';
    clone.style.maxHeight = 'none';
    clone.querySelectorAll('*').forEach(function(child){
      child.style.overflow  = 'visible';
      child.style.maxHeight = 'none';
      child.style.maxWidth  = 'none';
    });

    // Disable editing in lightbox
    clone.querySelectorAll('[data-editable]').forEach(function(t){
      t.contentEditable = 'false';
    });
    // Enable video/iframe interaction
    clone.querySelectorAll('iframe').forEach(function(fr){
      fr.style.pointerEvents = 'all';
      fr.style.overflow = 'hidden'; // iframes need their own overflow
    });
    clone.querySelectorAll('video').forEach(function(v){
      v.controls = true;
    });

    // Measure natural full height — temporarily render at natural size
    clone.style.width    = el.offsetWidth + 'px';
    clone.style.height   = 'auto';
    clone.style.position = 'absolute';
    clone.style.visibility = 'hidden';
    document.body.appendChild(clone);
    var w = clone.offsetWidth  || el.offsetWidth  || 320;
    var h = clone.offsetHeight || el.offsetHeight || 240;
    document.body.removeChild(clone);
    clone.style.position   = '';
    clone.style.visibility = '';

    // Calculate scale to fit inside available viewport
    var pad  = 80;
    var maxW = window.innerWidth  - pad * 2;
    var maxH = window.innerHeight - pad * 2;
    var scale = Math.min(maxW / w, maxH / h, 2.8);
    if (scale < 1) scale = 1;

    var scaledW = Math.round(w * scale);
    var scaledH = Math.round(h * scale);

    // Render clone at natural size, centered, then scale from center
    clone.style.width  = w + 'px';
    clone.style.height = h + 'px';
    clone.style.flexShrink = '0';
    clone.style.transform       = 'scale(' + scale + ')';
    clone.style.transformOrigin = 'center center';

    // Wrapper sized to the scaled footprint so flex centering works correctly
    var wrap = document.createElement('div');
    wrap.style.cssText = [
      'display:flex',
      'align-items:center',
      'justify-content:center',
      'width:'  + scaledW + 'px',
      'height:' + scaledH + 'px',
      'overflow:visible',
      'flex-shrink:0'
    ].join(';');
    wrap.appendChild(clone);

    var inner = document.getElementById('lightbox-inner');
    inner.style.width  = scaledW + 'px';
    inner.style.height = scaledH + 'px';

    this.content.style.cssText = '';
    this.content.innerHTML = '';
    this.content.appendChild(wrap);

    // Trigger fade-in on next frame so browser paints opacity:0 first
    this.box.classList.add('open');
    document.body.style.overflow = 'hidden';
    var lbContent = this.content;
    lbContent.style.opacity = '0';
    lbContent.style.transform = 'scale(0.94)';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        lbContent.style.transition = 'opacity 0.30s ease, transform 0.30s cubic-bezier(0.34,1.56,0.64,1)';
        lbContent.style.opacity = '1';
        lbContent.style.transform = 'scale(1)';
      });
    });
  },

  close: function() {
    var lbContent = this.content;
    lbContent.style.transition = 'opacity 0.20s ease, transform 0.20s ease';
    lbContent.style.opacity = '0';
    lbContent.style.transform = 'scale(0.96)';
    var self = this;
    setTimeout(function() {
      self.box.classList.remove('open');
      document.body.style.overflow = '';
      lbContent.innerHTML = '';
      lbContent.style.cssText = '';
    }, 200);
  },

  init: function() {
    var self = this;
    // Close on backdrop click
    this.box.addEventListener('click', function(e) {
      if (e.target === self.box || e.target === document.getElementById('lightbox-inner')) {
        self.close();
      }
    });
    // Close button
    document.getElementById('lightbox-close').onclick = function() { self.close(); };
    // Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && self.box.classList.contains('open')) {
        e.stopPropagation();
        self.close();
      }
    });
    // Double-click on canvas elements to open lightbox
    canvas.addEventListener('dblclick', function(e) {
      if (EDIT.active) return; // don't open lightbox in edit mode
      var drag = e.target.closest('.drag');
      if (drag) {
        e.preventDefault();
        self.open(drag);
      }
    });
  }
};

// ── PERSISTENCE (localStorage) ───────────────────────────────────────────────
var STORE = {
  // Save current canvas state for a project
  saveProject: function(projectId) {
    var state = { positions: {}, deleted: [] };
    canvas.querySelectorAll('.drag').forEach(function(el) {
      var key = el.dataset.key;
      if (key) {
        // Check if element is still in canvas (not deleted)
        state.positions[key] = {
          x: parseInt(el.style.left) || 0,
          y: parseInt(el.style.top)  || 0
        };
        if (el.dataset.rot) state.positions[key].rot = parseFloat(el.dataset.rot);
      }
    });
    // Track which base keys are missing (deleted)
    var baseKeys = ['logo','brand','desc','photo','challenge','role','copy','post0','post1','post2','browser'];
    baseKeys.forEach(function(k) {
      var found = false;
      canvas.querySelectorAll('.drag').forEach(function(el){ if(el.dataset.key===k) found=true; });
      if (!found) state.deleted.push(k);
    });
    try { localStorage.setItem('proj_'+projectId, JSON.stringify(state)); } catch(e){}
  },

  // Load saved state for a project
  loadProject: function(projectId) {
    try {
      var raw = localStorage.getItem('proj_'+projectId);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  },

  // Save skin
  saveSkin: function(name) {
    try { localStorage.setItem('portfolio_skin', name); } catch(e){}
  },
  loadSkin: function() {
    try { return localStorage.getItem('portfolio_skin'); } catch(e){ return null; }
  },

  // Save scales
  saveScales: function(scales) {
    try { localStorage.setItem('portfolio_scales', JSON.stringify(scales)); } catch(e){}
  },
  loadScales: function() {
    try {
      var raw = localStorage.getItem('portfolio_scales');
      return raw ? JSON.parse(raw) : null;
    } catch(e){ return null; }
  }
};

// ── Override go() to save before switching ────────────────────────────────────
var _goOriginal = go;
go = function(i) {
  // Save current project state before leaving
  if (PROJECTS[current]) STORE.saveProject(PROJECTS[current].id);
  current = i;
  _buildWithState(PROJECTS[current]);
  updateNav();
  setTimeout(function(){ MAG.sync(); }, 60);
};

// ── Build with saved state ─────────────────────────────────────────────────────
function _buildWithState(p) {
  var saved = STORE.loadProject(p.id);
  canvas.innerHTML = '';

  // Override BASE with saved positions for this project
  var effectiveBase = JSON.parse(JSON.stringify(BASE));
  if (saved && saved.positions) {
    Object.keys(saved.positions).forEach(function(k) {
      effectiveBase[k] = saved.positions[k];
    });
  }

  var deletedKeys = (saved && saved.deleted) ? saved.deleted : [];

  // Temporarily override BASE for build()
  var origBase = BASE;
  BASE = effectiveBase;
  build(p);
  BASE = origBase;

  // Remove deleted elements
  deletedKeys.forEach(function(k) {
    canvas.querySelectorAll('.drag').forEach(function(el) {
      if (el.dataset.key === k) el.parentNode && el.parentNode.removeChild(el);
    });
  });
}

// ── Autosave on drag end ──────────────────────────────────────────────────────
document.addEventListener('mouseup', function() {
  if (PROJECTS[current]) {
    setTimeout(function() { STORE.saveProject(PROJECTS[current].id); }, 100);
  }
});

// ── Autosave on delete ────────────────────────────────────────────────────────
// Wrap the delete button click — already handled via autosave on mouseup

// ── INIT ──────────────────────────────────────────────────────────────────────
buildDots();
// Use go() directly (now uses _buildWithState)
current = 0;
_buildWithState(PROJECTS[current]);
updateNav();
MAG.init();
setTimeout(function(){ MAG.sync(); }, 350);
EDIT.init();
LB.init();

// Restore skin
var savedSkin = STORE.loadSkin() || 'blueprint';
EDIT.setSkin(savedSkin);

// Restore scales
var savedScales = STORE.loadScales();
if (savedScales) {
  var sm2 = {notes:'sc-notes',photo:'sc-photo',posts:'sc-posts',browser:'sc-browser',logo:'sc-logo',icons:'sc-icons'};
  Object.keys(savedScales).forEach(function(k){
    var sl=document.getElementById(sm2[k]); if(sl)sl.value=savedScales[k];
    var vl=document.getElementById('sv-'+k); if(vl)vl.textContent=savedScales[k].toFixed(1)+'x';
  });
}
var _initSkin = SAVED_SKIN || 'dark';
if(_initSkin !== 'default') EDIT.setSkin(_initSkin);
</script>
